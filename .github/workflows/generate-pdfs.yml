name: Generate PDFs

on:
  push:
    paths:
      - 'pr/**.html'
      - 'kontrol/**.html'
      - 'theory/**.html'
      - 'scripts/generate_all_pdfs.py'
      - 'umk-matematika.cls'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install LaTeX
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-lang-cyrillic cm-super
    - name: Clean old files
      run: |
        rm -rf tex_all
        rm -rf pr/tex
        rm -rf pr/pdf
        mkdir -p tex_all
    - name: Generate LaTeX
      run: python scripts/generate_all_pdfs.py
    - name: Compile PDFs
      run: |
        cd tex_all
        for f in *.tex; do pdflatex -interaction=nonstopmode "$f" || true; done
    - name: Distribute PDFs to folders
      run: |
        # Копируем PDF в соответствующие папки сайта
        mkdir -p pr/pdf theory/pdf kontrol/pdf interaktiv/pdf
        
        # Практические работы
        for i in $(seq -w 1 28); do
          cp tex_all/pr_${i}.pdf pr/pdf/ 2>/dev/null || true
          cp tex_all/sr_${i}.pdf pr/pdf/ 2>/dev/null || true
          cp tex_all/kr_${i}.pdf pr/pdf/ 2>/dev/null || true
        done
        
        # Теория (опорные конспекты)
        for i in $(seq -w 1 9); do
          cp tex_all/ok_${i}.pdf theory/pdf/ 2>/dev/null || true
        done
        
        # Контроль
        cp tex_all/vhodnoy_kontrol.pdf kontrol/pdf/ 2>/dev/null || true
        cp tex_all/tekushiy_kontrol.pdf kontrol/pdf/ 2>/dev/null || true
        cp tex_all/tematicheskiy_kontrol.pdf kontrol/pdf/ 2>/dev/null || true
        cp tex_all/itogovyy_kontrol.pdf kontrol/pdf/ 2>/dev/null || true
        
        # Интерактив (если есть PDF)
        cp tex_all/*.pdf interaktiv/pdf/ 2>/dev/null || true
        
        ls -la pr/pdf/ theory/pdf/ kontrol/pdf/ 2>/dev/null || true
    - name: Commit PDFs to repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pr/pdf/ theory/pdf/ kontrol/pdf/ interaktiv/pdf/
        git diff --staged --quiet || git commit -m "📄 Auto-generated PDFs [skip ci]"
        git push
