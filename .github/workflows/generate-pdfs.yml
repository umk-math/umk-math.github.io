name: Generate PDFs

on:
  push:
    paths:
      - 'pr/**.html'
      - 'kontrol/**.html'
      - 'theory/**.html'
      - 'scripts/generate_all_pdfs.py'
      - 'umk-matematika.cls'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install LaTeX
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-lang-cyrillic cm-super
    - name: Clean old files
      run: |
        rm -rf tex_all
        rm -rf pr/tex pr/pdf
        rm -rf theory/pdf
        rm -rf kontrol/pdf
        mkdir -p tex_all
    - name: Generate LaTeX
      run: python scripts/generate_all_pdfs.py
    - name: Compile PDFs
      run: |
        cd tex_all
        for f in *.tex; do 
          echo "Compiling $f..."
          pdflatex -interaction=nonstopmode "$f" || echo "WARNING: $f failed"
          # Второй прогон для оглавления/ссылок
          pdflatex -interaction=nonstopmode "$f" || true
        done
        ls -la *.pdf || echo "No PDFs generated"
    - name: Distribute PDFs to folders
      run: |
        # Создаём папки
        mkdir -p pr/pdf theory/pdf kontrol/pdf
        
        # Практические работы
        echo "--- Практические работы ---"
        for f in tex_all/pr_*.pdf; do
          [ -f "$f" ] && cp "$f" pr/pdf/ && echo "Copied $f"
        done
        
        # Самостоятельные работы
        echo "--- Самостоятельные работы ---"
        for f in tex_all/sam_*.pdf; do
          [ -f "$f" ] && cp "$f" kontrol/pdf/ && echo "Copied $f"
        done
        
        # Контрольные работы
        echo "--- Контрольные работы ---"
        for f in tex_all/kr_*.pdf; do
          [ -f "$f" ] && cp "$f" kontrol/pdf/ && echo "Copied $f"
        done
        
        # Экзамен
        [ -f tex_all/exam_bilety.pdf ] && cp tex_all/exam_bilety.pdf kontrol/pdf/ && echo "Copied exam_bilety.pdf"
        
        # Входной контроль
        [ -f tex_all/vhodnoj.pdf ] && cp tex_all/vhodnoj.pdf kontrol/pdf/ && echo "Copied vhodnoj.pdf"
        
        # Теория
        echo "--- Теория ---"
        for f in tex_all/theory_*.pdf; do
          [ -f "$f" ] && cp "$f" theory/pdf/ && echo "Copied $f"
        done
        
        # Показываем результат
        echo ""
        echo "=== Итоговое содержимое ==="
        ls -la pr/pdf/ 2>/dev/null || echo "pr/pdf/ пуста"
        ls -la theory/pdf/ 2>/dev/null || echo "theory/pdf/ пуста"
        ls -la kontrol/pdf/ 2>/dev/null || echo "kontrol/pdf/ пуста"
    - name: Commit PDFs to repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pr/pdf/ theory/pdf/ kontrol/pdf/
        git diff --staged --quiet || git commit -m "📄 Auto-generated PDFs [skip ci]"
        git push
